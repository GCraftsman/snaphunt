name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder/placeholder
          AI_INTEGRATIONS_OPENAI_API_KEY: placeholder
          AI_INTEGRATIONS_OPENAI_BASE_URL: https://placeholder.example.com

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist/
          retention-days: 7
